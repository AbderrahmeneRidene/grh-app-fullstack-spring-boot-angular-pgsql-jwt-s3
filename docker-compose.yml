version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: grh_postgres
    environment:
      POSTGRES_DB: grh_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  minio:
    image: minio/minio
    container_name: grh_minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: supersecretpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: grh_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@grh.gov.tn
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    restart: always

volumes:
  postgres_data:
  minio_data:
